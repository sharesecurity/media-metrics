version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: mm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: media
      POSTGRES_PASSWORD: media_metrics_2024
      POSTGRES_DB: media_metrics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media -d media_metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mm_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: mm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: media_metrics
      MINIO_ROOT_PASSWORD: media_metrics_2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /Volumes/LabStorage/media_metrics/minio:/data

  backend:
    build: ./backend
    container_name: mm_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override for Docker networking (services reach each other by container name)
      DATABASE_URL: postgresql+asyncpg://media:media_metrics_2024@postgres:5432/media_metrics
      QDRANT_HOST: qdrant
      MINIO_HOST: minio
      # Ollama is native on host — containers reach it via host.docker.internal
      OLLAMA_URL: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  qdrant_data:

# Note: Frontend runs locally via `npm run dev` in frontend/ for development.
# For production, build and serve the frontend separately.
