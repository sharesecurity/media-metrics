version: "3.9"

# Port assignments (chosen to avoid conflicts with other projects on this machine):
#   mm_postgres  → 5434  (5432=system, 5433=pain-postgres)
#   mm_qdrant    → 6333/6334 (free)
#   mm_minio     → 8900 API, 8901 console
#   mm_backend   → 8010
#   mm_flower    → 5555
#   mm_grafana   → 3001

services:
  postgres:
    image: postgres:16
    container_name: mm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: media
      POSTGRES_PASSWORD: media_metrics_2024
      POSTGRES_DB: media_metrics
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media -d media_metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mm_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: mm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: media_metrics
      MINIO_ROOT_PASSWORD: media_metrics_2024
    ports:
      - "8900:9000"
      - "8901:9001"
    volumes:
      - /Volumes/LabStorage/media_metrics/minio:/data

  backend:
    build: ./backend
    container_name: mm_backend
    restart: unless-stopped
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://media:media_metrics_2024@postgres:5432/media_metrics
      QDRANT_HOST: qdrant
      MINIO_HOST: minio
      OLLAMA_URL: http://host.docker.internal:11434
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /Volumes/LabStorage/media_metrics/raw_articles:/Volumes/LabStorage/media_metrics/raw_articles:ro
      - mm_logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: mm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-beat:
    build: ./backend
    container_name: mm_celery_beat
    restart: unless-stopped
    command: celery -A app.worker beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://media:media_metrics_2024@postgres:5432/media_metrics
      QDRANT_HOST: qdrant
      MINIO_HOST: minio
      OLLAMA_URL: http://host.docker.internal:11434
      REDIS_URL: redis://redis:6379/0
      RSS_INGEST_INTERVAL_HOURS: ${RSS_INGEST_INTERVAL_HOURS:-6}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-worker:
    build: ./backend
    container_name: mm_celery_worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-1} -Q default
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://media:media_metrics_2024@postgres:5432/media_metrics
      QDRANT_HOST: qdrant
      MINIO_HOST: minio
      OLLAMA_URL: http://host.docker.internal:11434
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
      - /Volumes/LabStorage/media_metrics/raw_articles:/Volumes/LabStorage/media_metrics/raw_articles:ro
      - mm_logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  flower:
    image: mher/flower:2.0
    container_name: mm_flower
    restart: unless-stopped
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: mm_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: media_metrics_2024
      GF_INSTALL_PLUGINS: grafana-postgresql-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  grafana_data:
  redis_data:
  mm_logs:
